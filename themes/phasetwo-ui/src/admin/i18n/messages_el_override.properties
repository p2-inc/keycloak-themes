portalFeatureFlagsAlertBody=Αυτές οι εναλλαγές ελέγχουν ποιες λειτουργίες είναι ορατές στην Πύλη διαχειριστή. Η απενεργοποίηση μιας λειτουργίας την αποκρύπτει εντελώς από τους χρήστες της πύλης.
