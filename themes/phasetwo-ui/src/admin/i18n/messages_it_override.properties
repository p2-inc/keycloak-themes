portalLinkHelp=Consentire all'amministratore dell'organizzazione di configurare i propri provider di identità e di autogestire la propria organizzazione creando un collegamento al portale. Questo collegamento scade tra una settimana. Configura la data di scadenza per i collegamenti nelle impostazioni dell'organizzazione.
organizationPortalHelpTitleError=Errore di collegamento al portale
portalLinkError=Impossibile generare un collegamento. Se non è presente alcun utente amministratore in questa organizzazione, è necessario essere un membro di questa organizzazione (con tutti i ruoli organizzativi predefiniti) con privilegi di membro completi per creare un collegamento al portale.
