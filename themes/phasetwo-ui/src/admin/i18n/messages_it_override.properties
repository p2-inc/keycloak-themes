portalLinkInformation=Il collegamento al portale può essere generato solo se in questa organizzazione è presente un utente amministratore. Se non è presente alcun utente amministratore, è necessario essere un membro di questa organizzazione (con tutti i ruoli organizzativi predefiniti) con privilegi di membro completi per creare un collegamento al portale. Assicurati che in "Gestisci impostazioni" sia selezionato "Crea utente amministratore" per creare automaticamente un utente amministratore.
